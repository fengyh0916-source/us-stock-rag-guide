# Render 一键配置：https://dashboard.render.com → New → Blueprint
# 部署后把 Web Service 的 URL 填到 Vercel 的 VITE_API_BASE_URL

services:
  - type: web
    name: asset-tracker-api
    runtime: python
    plan: free
    region: singapore
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend/quote-bridge && npm install
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NODE_VERSION
        value: "20"
